<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Dit Shop</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700&family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <div class="container navbar-inner">
    <a href="index.html" class="navbar-brand">
      <div class="logo-icon">🌸</div>Dit Shop
    </a>
    <div class="navbar-actions">
      <div class="language-switcher">
        <button class="language-switcher-btn" id="languageSwitcherBtn" aria-label="Select language" aria-haspopup="true" aria-expanded="false">
          <div class="language-switcher-btn-content">
            <div class="language-switcher-btn-text">
              <span class="language-switcher-btn-flag">🇬🇧</span>
              <span class="language-switcher-btn-name">English</span>
              <span class="language-switcher-btn-code">(EN)</span>
            </div>
          </div>
          <span class="language-switcher-btn-arrow">▼</span>
        </button>

        <div class="language-switcher-menu" id="languageSwitcherMenu">
          <div class="language-switcher-item selected" data-lang="en">
            <span class="language-switcher-item-flag">🇬🇧</span>
            <div class="language-switcher-item-text">
              <span class="language-switcher-item-name">English</span>
              <span class="language-switcher-item-code">EN</span>
            </div>
          </div>
          <div class="language-switcher-item" data-lang="th">
            <span class="language-switcher-item-flag">🇹🇭</span>
            <div class="language-switcher-item-text">
              <span class="language-switcher-item-name">ไทย</span>
              <span class="language-switcher-item-code">TH</span>
            </div>
          </div>
          <div class="language-switcher-item" data-lang="lo">
            <span class="language-switcher-item-flag">🇱🇦</span>
            <div class="language-switcher-item-text">
              <span class="language-switcher-item-name">ລາວ</span>
              <span class="language-switcher-item-code">LA</span>
            </div>
          </div>
        </div>
      </div>
      <span style="color:var(--gray-400);font-size:.9rem;" data-i18n="nav_new_here">New here?</span>
      <a href="register.html" class="btn btn-primary btn-sm" data-i18n="nav_signup">Sign Up</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card card fade-in">
    <div style="text-align:center;margin-bottom:1.75rem;">
      <div style="font-size:3rem;margin-bottom:.5rem;">🌸</div>
      <h2 style="font-size:1.6rem;" data-i18n="login_welcome">Welcome Back</h2>
      <p class="text-muted" style="font-size:.9rem;margin-top:.25rem;" data-i18n="login_subtitle">Sign in to your Dit Shop account</p>
    </div>

    <div id="error-msg" class="form-error" style="display:none;margin-bottom:1rem;text-align:center;font-size:.88rem;background:var(--rose-50);padding:.65rem;border-radius:8px;"></div>
    <div id="info-msg" style="display:none;margin-bottom:1rem;text-align:center;font-size:.88rem;background:var(--pink-100);color:var(--rose-700);padding:.65rem;border-radius:8px;"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email" data-i18n="login_email">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required autocomplete="email" />
        <div class="form-error" id="email-error"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password" data-i18n="login_password">Password</label>
        <div style="position:relative;">
          <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password" style="padding-right:2.75rem;" />
          <button type="button" onclick="togglePwd('password','pwd-eye')" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;" id="pwd-eye">👁</button>
        </div>
        <div class="form-error" id="password-error"></div>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg mt-2" id="submit-btn" data-i18n="login_btn">
        Sign In
      </button>
    </form>

    <div class="auth-divider mt-3" data-i18n="login_or">or</div>
    
    <!-- Google Login Container -->
    <div id="google-btn-container" style="display:none;margin-top:1.25rem;margin-bottom:1.25rem;justify-content:center;">
      <div id="google-signin-btn"></div>
    </div>

    <p style="text-align:center;font-size:.88rem;color:var(--gray-400);">
      <span data-i18n="login_no_account">Don't have an account?</span> <a href="register.html" style="color:var(--rose-600);font-weight:600;" data-i18n="login_create_free">Create one free</a>
    </p>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) window.location.href = 'index.html';

  // Show expired session message
  if (new URLSearchParams(location.search).get('expired')) {
    document.getElementById('info-msg').style.display = 'block';
    document.getElementById('info-msg').textContent = 'Your session expired. Please log in again.';
  }

  function togglePwd(inputId, btnId) {
    const inp = document.getElementById(inputId);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    // Clear errors
    ['email-error','password-error'].forEach(id => document.getElementById(id).textContent = '');
    document.getElementById('error-msg').style.display = 'none';

    let valid = true;
    if (!email) { document.getElementById('email-error').textContent = 'Email is required.'; valid = false; }
    if (!password) { document.getElementById('password-error').textContent = 'Password is required.'; valid = false; }
    if (!valid) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Signing in…';

    try {
      const { token, user } = await api.post('/auth/login', { email, password });
      setSession(token, user);
      showToast('Welcome back, ' + user.username + '! 🌸', 'success');
      setTimeout(() => {
        window.location.href = user.role === 'admin' ? 'admin/index.html' : 'index.html';
      }, 800);
    } catch (err) {
      document.getElementById('error-msg').textContent = err.message || 'Login failed.';
      document.getElementById('error-msg').style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  });

  // Initialize Google Login dynamically
  async function initGoogleLogin() {
    try {
      const config = await api.get('/auth/google/config');
      if (config && config.clientId) {
        // Load Google Identity Services dynamically
        const script = document.createElement('script');
        script.src = 'https://accounts.google.com/gsi/client';
        script.async = true;
        script.defer = true;
        script.onload = () => {
          google.accounts.id.initialize({
            client_id: config.clientId,
            callback: handleCredentialResponse
          });
          google.accounts.id.renderButton(
            document.getElementById('google-signin-btn'),
            { theme: 'outline', size: 'large', width: 280 }
          );
          document.getElementById('google-btn-container').style.display = 'flex';
        };
        document.head.appendChild(script);
      }
    } catch (err) {
      console.error('Failed to load Google Sign-In config:', err);
    }
  }

  async function handleCredentialResponse(response) {
    const errorMsg = document.getElementById('error-msg');
    errorMsg.style.display = 'none';
    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;

    try {
      const { token, user } = await api.post('/auth/google', { idToken: response.credential });
      setSession(token, user);
      showToast('Welcome, ' + user.username + '! 🌸', 'success');
      setTimeout(() => {
        window.location.href = user.role === 'admin' ? 'admin/index.html' : 'index.html';
      }, 800);
    } catch (err) {
      errorMsg.textContent = err.message || 'Google Sign-In failed.';
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
    }
  }

  // Run on load
  initGoogleLogin();
</script>
<script src="js/translations.js"></script>
<script src="js/language-switcher.js"></script>
</body>
</html>
